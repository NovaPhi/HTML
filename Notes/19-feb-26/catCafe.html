<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Anime Cafe</title>
    <link rel="stylesheet" href="catCafe.css">
</head>

<body>

    <div class="Header">
        <h1>EVA Cafe</h1>
    </div>

    <div id="par1" class="Content">
        <p>Welcome to the EVA cafe</p> 
        <p>MENU</p>
        <p>Shinji's Americano: 45$</p>
        <p>Asuka's Macchiato: 55$</p>
        <p>Misato's beer: 90$</p> 
        <p>Angels Expresso: 20$</p>            
    </div>

    <marquee behavior="alternate" scrollamount="30">
        <marquee behavior="alternate" scrollamount="30" direction="down">
            <img src="maxwell-cat.gif">
        </marquee>       
    </marquee>

    <div style="text-align: center;">
        <button onclick="traducir()">Traductor</button>
        <button id="changeBtn">Change Background</button>
    </div>

    <div style="text-align:center;">
        <audio id="Music" autoplay loop hidden>
            <source src="1. FLY ME TO THE MOON.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="Footer">
        <h6>derechos reservados</h6>
    </div>

    
    <script src="catCafe.js"></script>

</body>
</html>
